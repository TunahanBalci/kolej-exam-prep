<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mind Map</title>
  <style>
    :root {
      --bg: #070b14;
      --panel: rgba(15, 23, 42, 0.78);
      --card: #111827;
      --text: #f8fafc;
      --muted: #a8b3c7;
      --root: #60a5fa;
      --branch-1: #34d399;
      --branch-2: #fbbf24;
      --branch-3: #a78bfa;
      --branch-4: #fb7185;
      --branch-5: #22d3ee;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(30, 41, 59, 0.95) 0%, rgba(7, 11, 20, 0.96) 48%, rgba(2, 6, 23, 1) 100%),
        linear-gradient(135deg, #020617, #0f172a);
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 14px 18px 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: #e5e7eb;
      color: #111827;
      cursor: pointer;
      font-weight: 750;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.15);
    }

    button.secondary {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.36);
    }

    button:active { transform: translateY(1px); }

    .depth-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.36);
      color: var(--text);
      font-weight: 750;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.15);
    }

    .depth-control input {
      width: 76px;
      border: 1px solid rgba(148, 163, 184, 0.38);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(2, 6, 23, 0.65);
      color: var(--text);
      font: inherit;
      font-weight: 750;
      outline: none;
    }

    .depth-control input:focus {
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    main {
      width: min(1500px, 100%);
      margin: 0 auto;
      padding: 0 18px 30px;
    }

    .mind-map-wrapper {
      position: relative;
      overflow: hidden;
      height: 74vh;
      min-height: 680px;
      border-radius: 30px;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      cursor: grab;
      touch-action: none;
    }

    .mind-map-wrapper.dragging {
      cursor: grabbing;
    }

    .mind-map-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.11) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .viewport-hint {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 3;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: var(--muted);
      font-size: 0.82rem;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      pointer-events: none;
    }

    .map-stage {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    .mind-map {
      position: relative;
      min-width: 1100px;
      min-height: 650px;
    }

    svg.connections {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 0;
    }

    .node {
      position: absolute;
      z-index: 1;
      width: 220px;
      min-height: 92px;
      padding: 14px 15px 13px;
      border-radius: 20px;
      background: var(--card);
      border: 2px solid currentColor;
      box-shadow: var(--shadow);
      text-align: center;
      user-select: none;
      transform: translate(-50%, 0);
      transition: left 160ms ease, top 160ms ease;
    }

    .node.root {
      width: 260px;
      min-height: 104px;
      color: var(--root);
      background: #0f2547;
    }

    .branch-1 { color: var(--branch-1); background: #0f2a22; }
    .branch-2 { color: var(--branch-2); background: #2b210b; }
    .branch-3 { color: var(--branch-3); background: #241a3b; }
    .branch-4 { color: var(--branch-4); background: #35151b; }
    .branch-5 { color: var(--branch-5); background: #0b2a33; }

    .node-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .toggle {
      flex: 0 0 auto;
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid currentColor;
      background: rgba(15, 23, 42, 0.72);
      color: currentColor;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      box-shadow: none;
      padding: 0;
    }

    .toggle.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .title {
      font-weight: 850;
      font-size: 1rem;
      line-height: 1.25;
      outline: none;
    }

    .note {
      margin-top: 8px;
      font-size: 0.79rem;
      line-height: 1.38;
      color: var(--muted);
      outline: none;
    }

    [contenteditable="true"] {
      user-select: text;
      cursor: text;
    }

    [contenteditable="true"]:focus {
      background: rgba(2, 6, 23, 0.6);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
      border-radius: 8px;
    }

    .hidden-node { display: none; }


    /* IDE-style code block component
       Usage inside a node note:
       - Set htmlNote: true on the node data object.
       - Put the .code-card HTML inside the note string. */
    .node.code-node {
      width: 420px;
      min-height: 150px;
    }

    .node.layout-pending {
      visibility: hidden;
    }

    .node.code-node .node-header {
      text-align: center;
    }

    .node.code-node .note p {
      margin: 8px 0 0;
      text-align: left;
    }

    .code-card {
      margin-top: 10px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      overflow: hidden;
      text-align: left;
    }

    .code-top {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 6px 10px;
      background: rgba(15, 23, 42, 0.96);
      border-bottom: 1px solid rgba(148, 163, 184, 0.18);
      color: #cbd5e1;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.55);
      display: inline-block;
    }

    .code-lang {
      margin-left: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      color: #e2e8f0;
    }

    .code-card pre {
      margin: 0;
      padding: 12px 13px;
      max-height: 260px;
      overflow: auto;
      color: #e5e7eb;
      font-size: 0.72rem;
      line-height: 1.45;
      white-space: pre;
      tab-size: 2;
    }

    .code-card code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .code-result {
      padding: 7px 9px;
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.52);
      border: 1px solid rgba(148, 163, 184, 0.18);
      color: #cbd5e1;
      font-size: 0.74rem;
    }

    @media (max-width: 720px) {
      .mind-map-wrapper { min-height: 620px; border-radius: 22px; }
      .mind-map { min-width: 900px; }
      .node { width: 190px; }
      .node.root { width: 220px; }
      .node.code-node { width: 360px; }
    }

    @media print {
      body { background: white; }
      header, .toolbar, .viewport-hint { display: none; }
      main { padding: 0; width: 100%; }
      .mind-map-wrapper { box-shadow: none; border: 0; border-radius: 0; overflow: visible; height: auto; min-height: auto; }
      .map-stage { position: static; transform: none !important; }
      .node { box-shadow: none; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <button onclick="expandAll()">Expand All</button>
    <button class="secondary" onclick="collapseAll()">Collapse All</button>
    <button class="secondary" onclick="fitToView()">Fit to View</button>
    <button class="secondary" onclick="resetView()">Reset View</button>
    <label class="depth-control" for="depthInput">
      Depth
      <input id="depthInput" type="number" min="0" max="20" step="1" placeholder="All" title="0 = root only, 1 = root + main branches, empty = all levels" />
    </label>
  </div>

  <main>
    <section class="mind-map-wrapper" id="mapWrapper" aria-label="Collapsible top-down mind map">
      <div class="map-stage" id="mapStage">
        <div class="mind-map" id="mindMap">
          <svg class="connections" id="connections" aria-hidden="true"></svg>
        </div>
      </div>
      <div class="viewport-hint">Drag empty space to move · Wheel to zoom · Click circles to collapse</div>
    </section>

  </main>

  <script>
    const originalMindMapData = [
      { id: 'root', parent: null, title: 'Main Topic', note: 'Write the central idea here.', color: 'root', collapsed: false },

      { id: 'branch1', parent: 'root', title: 'Chapter / Category 1', note: 'Main branch heading.', color: 'branch-1', collapsed: false },
      { id: 'branch1a', parent: 'branch1', title: 'Subtopic 1.1', note: 'Key definition, fact, or concept.', color: 'branch-1', collapsed: false },
      { id: 'branch1b', parent: 'branch1', title: 'Subtopic 1.2', note: 'Another supporting point.', color: 'branch-1', collapsed: false },
      { id: 'branch1b1', parent: 'branch1b', title: 'Detail 1.2.a', note: 'Leaf-level detail.', color: 'branch-1', collapsed: false },
      { id: 'branch1b2', parent: 'branch1b', title: 'Detail 1.2.b', note: 'Leaf-level detail.', color: 'branch-1', collapsed: false },

      { id: 'branch2', parent: 'root', title: 'Chapter / Category 2', note: 'Second main branch.', color: 'branch-2', collapsed: false },
      { id: 'branch2a', parent: 'branch2', title: 'Subtopic 2.1', note: 'Formula, example, or explanation.', color: 'branch-2', collapsed: false },
      { id: 'branch2b', parent: 'branch2', title: 'Subtopic 2.2', note: 'Important comparison or rule.', color: 'branch-2', collapsed: false },
      { id: 'branch2c', parent: 'branch2', title: 'Subtopic 2.3', note: 'Useful reminder.', color: 'branch-2', collapsed: false },

      { id: 'branch3', parent: 'root', title: 'Chapter / Category 3', note: 'Third main branch.', color: 'branch-3', collapsed: false },
      { id: 'branch3a', parent: 'branch3', title: 'Subtopic 3.1', note: 'Cause, result, or relationship.', color: 'branch-3', collapsed: false },
      { id: 'branch3a1', parent: 'branch3a', title: 'Detail 3.1.a', note: 'Smaller connected idea.', color: 'branch-3', collapsed: false },
      { id: 'branch3a2', parent: 'branch3a', title: 'Detail 3.1.b', note: 'Smaller connected idea.', color: 'branch-3', collapsed: false },
      { id: 'branch3b', parent: 'branch3', title: 'Subtopic 3.2', note: 'Exception, warning, or edge case.', color: 'branch-3', collapsed: false },

      { id: 'branch4', parent: 'root', title: 'Chapter / Category 4', note: 'Fourth main branch.', color: 'branch-4', collapsed: false },
      { id: 'branch4a', parent: 'branch4', title: 'Subtopic 4.1', note: 'Task, process step, or checklist.', color: 'branch-4', collapsed: false },
      { id: 'branch4b', parent: 'branch4', title: 'Subtopic 4.2', note: 'Risk, decision, or dependency.', color: 'branch-4', collapsed: false },

      { id: 'branch5', parent: 'root', title: 'References / Next Steps', note: 'Use this for links, sources, or actions.', color: 'branch-5', collapsed: false },
      { id: 'branch5a', parent: 'branch5', title: 'Reference 1', note: 'Book, slide, paper, URL, or file name.', color: 'branch-5', collapsed: false },
      { id: 'branch5b', parent: 'branch5', title: 'Next Step', note: 'Action item or review target.', color: 'branch-5', collapsed: false },
      { id: 'branch5c', parent: 'branch5', title: 'Code Block Example', note: '<p>Set <strong>htmlNote: true</strong> and place a code-card inside the note.</p><div class="code-card"><div class="code-top"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="code-lang">Python</span></div><pre><code>def hello(name):\n    return f"Hello, {name}!"\n\nprint(hello("Mindmap"))</code></pre></div><p class="code-result"><strong>Result:</strong> Hello, Mindmap!</p>', color: 'branch-5', collapsed: false, htmlNote: true }
    ];


    let mindMapData = structuredClone(originalMindMapData);

    const wrapper = document.getElementById('mapWrapper');
    const stage = document.getElementById('mapStage');
    const mindMap = document.getElementById('mindMap');
    const svg = document.getElementById('connections');
    const depthInput = document.getElementById('depthInput');

    const DEFAULT_NODE_WIDTH = 220;
    const DEFAULT_ROOT_WIDTH = 260;
    const DEFAULT_CODE_WIDTH = 420;
    const HORIZONTAL_GAP = 96;
    const VERTICAL_GAP = 96;
    const STAGGER_Y = 46;
    const MARGIN_X = 110;
    const MARGIN_Y = 58;
    const MIN_MAP_WIDTH = 1100;
    const MIN_MAP_HEIGHT = 650;
    const MIN_SCALE = 0.25;
    const MAX_SCALE = 2.5;
    const DEFAULT_VISIBLE_DEPTH = Infinity;

    let maxVisibleDepth = DEFAULT_VISIBLE_DEPTH;
    let view = { x: 0, y: 0, scale: 1 };
    let hasFittedOnce = false;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let viewStart = { x: 0, y: 0 };
    let activePointers = [];
    let initialDistance = 0;
    let initialScale = 1;
    let initialMidpoint = { x: 0, y: 0 };
    let initialViewStart = { x: 0, y: 0 };
    let resizeObserver;
    let layoutPending = false;

    render();
    window.addEventListener('resize', () => {
      scheduleLayout();
      if (!hasFittedOnce) fitToView();
    });

    depthInput.addEventListener('input', () => {
      const rawValue = depthInput.value.trim();
      maxVisibleDepth = rawValue === ''
        ? DEFAULT_VISIBLE_DEPTH
        : Math.max(0, Math.floor(Number(rawValue) || 0));
      render();
    });

    function childrenOf(id) {
      return mindMapData.filter(node => node.parent === id);
    }

    function nodeById(id) {
      return mindMapData.find(node => node.id === id);
    }

    function hasChildren(id) {
      return childrenOf(id).length > 0;
    }

    function depthOf(node) {
      let depth = 0;
      let current = node;
      while (current.parent) {
        const parent = nodeById(current.parent);
        if (!parent) break;
        depth += 1;
        current = parent;
      }
      return depth;
    }

    function isVisible(node) {
      if (depthOf(node) > maxVisibleDepth) return false;

      let current = node;
      while (current.parent) {
        const parent = nodeById(current.parent);
        if (!parent || parent.collapsed) return false;
        current = parent;
      }
      return true;
    }

    function visibleChildrenOf(id) {
      const parent = nodeById(id);
      if (!parent || parent.collapsed || depthOf(parent) >= maxVisibleDepth) return [];
      return childrenOf(id).filter(isVisible);
    }

    function fallbackWidth(node) {
      if (node.id === 'root') return DEFAULT_ROOT_WIDTH;
      if (node.htmlNote) return DEFAULT_CODE_WIDTH;
      return DEFAULT_NODE_WIDTH;
    }

    function measureNodeDimensions() {
      const dimensions = new Map();
      mindMap.querySelectorAll('.node:not(.hidden-node)').forEach(el => {
        const node = nodeById(el.id);
        dimensions.set(el.id, {
          width: Math.ceil(el.offsetWidth || fallbackWidth(node)),
          height: Math.ceil(el.offsetHeight || 92)
        });
      });
      return dimensions;
    }

    function dimensionOf(node, dimensions) {
      return dimensions.get(node.id) || {
        width: fallbackWidth(node),
        height: node.id === 'root' ? 104 : node.htmlNote ? 150 : 92
      };
    }

    function computeLevelMetrics(dimensions) {
      const levelMetrics = [];
      mindMapData.forEach(node => {
        if (!isVisible(node)) return;
        const depth = depthOf(node);
        const dim = dimensionOf(node, dimensions);
        if (!levelMetrics[depth]) levelMetrics[depth] = { maxHeight: 0, hasNodes: false };
        levelMetrics[depth].maxHeight = Math.max(levelMetrics[depth].maxHeight, dim.height);
        levelMetrics[depth].hasNodes = true;
      });

      const yByDepth = [];
      let y = MARGIN_Y;
      for (let depth = 0; depth < levelMetrics.length; depth++) {
        if (!levelMetrics[depth]) continue;
        yByDepth[depth] = y;
        const staggerRoom = depth >= 2 ? STAGGER_Y : 0;
        y += levelMetrics[depth].maxHeight + staggerRoom + VERTICAL_GAP;
      }

      return { levelMetrics, yByDepth, totalHeight: y + MARGIN_Y - VERTICAL_GAP };
    }

    function computeLayout(dimensions) {
      const root = mindMapData.find(node => node.parent === null);
      const positions = new Map();
      const subtreeWidths = new Map();
      const orderByDepth = new Map();
      let maxDepth = 0;
      let rightMost = 0;
      let bottomMost = 0;
      const { yByDepth, totalHeight: levelTotalHeight } = computeLevelMetrics(dimensions);

      function computeSubtreeWidth(node) {
        const dim = dimensionOf(node, dimensions);
        const visibleChildren = visibleChildrenOf(node.id);
        let width = dim.width;

        if (visibleChildren.length > 0) {
          const childrenWidth = visibleChildren.reduce((sum, child, index) => {
            const gap = index === 0 ? 0 : HORIZONTAL_GAP;
            return sum + gap + computeSubtreeWidth(child);
          }, 0);
          width = Math.max(width, childrenWidth);
        }

        subtreeWidths.set(node.id, width);
        return width;
      }

      function assignPositions(node, left, depth) {
        maxDepth = Math.max(maxDepth, depth);
        const dim = dimensionOf(node, dimensions);
        const subtreeWidth = subtreeWidths.get(node.id) || dim.width;
        const order = orderByDepth.get(depth) || 0;
        orderByDepth.set(depth, order + 1);
        const stagger = depth >= 2 && order % 2 === 1 ? STAGGER_Y : 0;
        const x = left + subtreeWidth / 2;
        const y = (yByDepth[depth] ?? MARGIN_Y) + stagger;

        positions.set(node.id, { x, y, depth, width: dim.width, height: dim.height });
        rightMost = Math.max(rightMost, x + dim.width / 2);
        bottomMost = Math.max(bottomMost, y + dim.height);

        const visibleChildren = visibleChildrenOf(node.id);
        if (visibleChildren.length > 0) {
          const childTotalWidth = visibleChildren.reduce((sum, child, index) => {
            const gap = index === 0 ? 0 : HORIZONTAL_GAP;
            return sum + gap + (subtreeWidths.get(child.id) || dimensionOf(child, dimensions).width);
          }, 0);
          let childLeft = left + (subtreeWidth - childTotalWidth) / 2;
          visibleChildren.forEach((child, index) => {
            if (index > 0) childLeft += HORIZONTAL_GAP;
            assignPositions(child, childLeft, depth + 1);
            childLeft += subtreeWidths.get(child.id) || dimensionOf(child, dimensions).width;
          });
        }
      }

      const rootWidth = computeSubtreeWidth(root);
      assignPositions(root, MARGIN_X, 0);
      const totalWidth = Math.max(MIN_MAP_WIDTH, MARGIN_X + rootWidth + MARGIN_X, rightMost + MARGIN_X);
      const totalHeight = Math.max(MIN_MAP_HEIGHT, levelTotalHeight, bottomMost + MARGIN_Y);
      return { positions, totalWidth, totalHeight, maxDepth };
    }

    function render() {
      mindMap.querySelectorAll('.node').forEach(node => node.remove());

      mindMapData.forEach(item => {
        const visible = isVisible(item);
        if (!visible) return;

        const article = document.createElement('article');
        article.className = `node ${item.color} ${item.htmlNote ? 'code-node' : ''} layout-pending`;
        article.id = item.id;
        article.dataset.parent = item.parent || '';
        article.dataset.x = '0';
        article.dataset.y = '0';
        article.style.left = '0px';
        article.style.top = '0px';

        const toggleSymbol = item.collapsed ? '+' : '−';
        const canToggle = hasChildren(item.id) && depthOf(item) < maxVisibleDepth;
        const toggleClass = canToggle ? 'toggle' : 'toggle empty';

        article.innerHTML = `
          <div class="node-header">
            <button class="${toggleClass}" type="button" aria-label="Toggle branch">${toggleSymbol}</button>
            <div class="title" contenteditable="true" spellcheck="false"></div>
          </div>
          <div class="note" contenteditable="true" spellcheck="false"></div>
        `;

        article.querySelector('.title').textContent = item.title;
        const noteEl = article.querySelector('.note');
        if (item.htmlNote) {
          noteEl.innerHTML = item.note;
        } else {
          noteEl.textContent = item.note;
        }

        article.querySelector('.toggle').addEventListener('click', event => {
          event.stopPropagation();
          item.collapsed = !item.collapsed;
          render();
        });

        article.querySelector('.title').addEventListener('input', event => {
          item.title = event.currentTarget.textContent.trim() || 'Untitled';
          scheduleLayout();
        });

        article.querySelector('.note').addEventListener('input', event => {
          item.note = item.htmlNote ? event.currentTarget.innerHTML.trim() : event.currentTarget.textContent.trim();
          scheduleLayout();
        });

        mindMap.appendChild(article);
      });

      layoutExistingNodes();
      observeNodeSizes();
      if (!hasFittedOnce) requestAnimationFrame(fitToView);
    }

    function scheduleLayout() {
      if (layoutPending) return;
      layoutPending = true;
      requestAnimationFrame(() => {
        layoutPending = false;
        layoutExistingNodes();
      });
    }

    function layoutExistingNodes() {
      const dimensions = measureNodeDimensions();
      const { positions, totalWidth, totalHeight } = computeLayout(dimensions);
      mindMap.style.width = `${totalWidth}px`;
      mindMap.style.height = `${totalHeight}px`;
      stage.style.width = `${totalWidth}px`;
      stage.style.height = `${totalHeight}px`;

      mindMap.querySelectorAll('.node').forEach(article => {
        const position = positions.get(article.id);
        if (!position) {
          article.classList.add('hidden-node');
          return;
        }
        article.dataset.x = String(position.x);
        article.dataset.y = String(position.y);
        article.style.left = `${position.x}px`;
        article.style.top = `${position.y}px`;
        article.classList.remove('layout-pending', 'hidden-node');
      });

      scheduleConnectionRedraw();
    }

    function getNodeCenterTop(node) {
      return {
        x: Number(node.dataset.x),
        y: Number(node.dataset.y)
      };
    }

    function getNodeCenterBottom(node) {
      return {
        x: Number(node.dataset.x),
        y: Number(node.dataset.y) + node.offsetHeight
      };
    }

    function scheduleConnectionRedraw() {
      requestAnimationFrame(() => requestAnimationFrame(drawConnections));
    }

    function drawConnections() {
      svg.innerHTML = '';
      svg.setAttribute('width', mindMap.offsetWidth);
      svg.setAttribute('height', mindMap.offsetHeight);
      svg.setAttribute('viewBox', `0 0 ${mindMap.offsetWidth} ${mindMap.offsetHeight}`);

      mindMapData.forEach(item => {
        if (!item.parent || !isVisible(item)) return;
        const parent = document.getElementById(item.parent);
        const child = document.getElementById(item.id);
        if (!parent || !child || parent.classList.contains('hidden-node') || child.classList.contains('hidden-node')) return;

        const start = getNodeCenterBottom(parent);
        const end = getNodeCenterTop(child);
        const verticalGap = Math.max(30, end.y - start.y);
        const midY = start.y + verticalGap / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${start.x} ${start.y} C ${start.x} ${midY}, ${end.x} ${midY}, ${end.x} ${end.y}`);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', getComputedStyle(child).color || '#b8c1d1');
        path.setAttribute('stroke-width', '3');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('opacity', '0.58');
        svg.appendChild(path);
      });
    }

    function observeNodeSizes() {
      if (resizeObserver) resizeObserver.disconnect();
      resizeObserver = new ResizeObserver(() => scheduleLayout());
      mindMap.querySelectorAll('.node').forEach(node => resizeObserver.observe(node));
    }

    function applyView() {
      stage.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
    }

    function clampScale(value) {
      return Math.min(MAX_SCALE, Math.max(MIN_SCALE, value));
    }

    function fitToView() {
      const padding = 42;
      const scaleX = (wrapper.clientWidth - padding * 2) / mindMap.offsetWidth;
      const scaleY = (wrapper.clientHeight - padding * 2) / mindMap.offsetHeight;
      view.scale = clampScale(Math.min(scaleX, scaleY, 1));
      view.x = (wrapper.clientWidth - mindMap.offsetWidth * view.scale) / 2;
      view.y = padding;
      hasFittedOnce = true;
      applyView();
    }

    function resetView() {
      hasFittedOnce = true;
      view = { x: 60, y: 44, scale: 1 };
      applyView();
    }

    wrapper.addEventListener('pointerdown', event => {
      if (event.pointerType === 'mouse' && event.button !== 0) return;
      if (event.target.closest('.node') || event.target.closest('button')) return;

      activePointers.push(event);
      wrapper.setPointerCapture(event.pointerId);

      if (activePointers.length === 1) {
        isDragging = true;
        wrapper.classList.add('dragging');
        dragStart = { x: event.clientX, y: event.clientY };
        viewStart = { x: view.x, y: view.y };
      } else if (activePointers.length === 2) {
        isDragging = false;
        wrapper.classList.remove('dragging');

        const p1 = activePointers[0];
        const p2 = activePointers[1];
        initialDistance = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
        initialScale = view.scale;

        const screenMidX = (p1.clientX + p2.clientX) / 2;
        const screenMidY = (p1.clientY + p2.clientY) / 2;
        const rect = wrapper.getBoundingClientRect();
        initialMidpoint = {
          x: screenMidX - rect.left,
          y: screenMidY - rect.top
        };
        initialViewStart = { x: view.x, y: view.y };
      }
    });

    wrapper.addEventListener('pointermove', event => {
      const idx = activePointers.findIndex(p => p.pointerId === event.pointerId);
      if (idx !== -1) {
        activePointers[idx] = event;
      }

      if (activePointers.length === 1 && isDragging) {
        view.x = viewStart.x + event.clientX - dragStart.x;
        view.y = viewStart.y + event.clientY - dragStart.y;
        applyView();
      } else if (activePointers.length === 2 && initialDistance > 0) {
        const p1 = activePointers[0];
        const p2 = activePointers[1];
        const currentDistance = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
        const ratio = currentDistance / initialDistance;
        const newScale = clampScale(initialScale * ratio);

        const screenMidX = (p1.clientX + p2.clientX) / 2;
        const screenMidY = (p1.clientY + p2.clientY) / 2;
        const rect = wrapper.getBoundingClientRect();
        const midX = screenMidX - rect.left;
        const midY = screenMidY - rect.top;

        const mapX = (initialMidpoint.x - initialViewStart.x) / initialScale;
        const mapY = (initialMidpoint.y - initialViewStart.y) / initialScale;

        view.scale = newScale;
        view.x = midX - mapX * newScale;
        view.y = midY - mapY * newScale;
        applyView();
      }
    });

    wrapper.addEventListener('pointerup', endDrag);
    wrapper.addEventListener('pointercancel', endDrag);
    wrapper.addEventListener('pointerleave', endDrag);

    function endDrag(event) {
      activePointers = activePointers.filter(p => p.pointerId !== event.pointerId);
      try { wrapper.releasePointerCapture(event.pointerId); } catch (_) {}

      if (activePointers.length < 2) {
        initialDistance = 0;
      }

      if (activePointers.length === 0) {
        isDragging = false;
        wrapper.classList.remove('dragging');
      } else if (activePointers.length === 1) {
        const remaining = activePointers[0];
        isDragging = true;
        wrapper.classList.add('dragging');
        dragStart = { x: remaining.clientX, y: remaining.clientY };
        viewStart = { x: view.x, y: view.y };
      }
    }

    wrapper.addEventListener('wheel', event => {
      event.preventDefault();
      const rect = wrapper.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;
      const oldScale = view.scale;
      const zoomFactor = event.deltaY < 0 ? 1.08 : 0.92;
      const newScale = clampScale(oldScale * zoomFactor);
      const mapX = (mouseX - view.x) / oldScale;
      const mapY = (mouseY - view.y) / oldScale;
      view.scale = newScale;
      view.x = mouseX - mapX * newScale;
      view.y = mouseY - mapY * newScale;
      applyView();
    }, { passive: false });

    function expandAll() {
      mindMapData.forEach(node => node.collapsed = false);
      render();
    }

    function collapseAll() {
      mindMapData.forEach(node => {
        if (node.parent !== null) node.collapsed = true;
      });
      render();
    }

    function resetTemplate() {
      mindMapData = structuredClone(originalMindMapData);
      hasFittedOnce = false;
      render();
    }

  </script>
</body>
</html>
